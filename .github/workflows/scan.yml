name: NBA高勝率套利掃描

on:
  schedule:
    # Every 15 min during UTC 1–9 (NBA game hours)
    - cron: "0,15,30,45 1-9 * * *"
    # Every hour otherwise
    - cron: "0 0,10-23 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Cache sent_alerts.json
        uses: actions/cache@v4
        with:
          path: sent_alerts.json
          key: sent-alerts-${{ github.run_id }}
          restore-keys: |
            sent-alerts-

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run arbitrage scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          STAKE_TWD: ${{ secrets.STAKE_TWD }}
        run: python arbitrage_alert.py
